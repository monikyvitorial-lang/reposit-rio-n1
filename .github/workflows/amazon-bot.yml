name: Amazon Bot - Rodada Diária

on:
  schedule:
    # Executa a cada 2 horas a partir das 08:00 UTC
    - cron: '0 8-22/2 * * *'
  workflow_dispatch:  # Permite executar manualmente

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar Chrome e dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver
      
      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Executar bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          MIN_DISCOUNT_PERCENT: '10'
          MAX_DISCOUNT_PERCENT: '30'
          MAX_PRODUCTS_PER_RUN: '10'
          DELAY_BETWEEN_MESSAGES: '2'
          HEADLESS: 'true'
          WDM_CACHE_PATH: /home/runner/.wdm
        run: |
          mkdir -p /home/runner/.wdm
          python bot.py
      
      - name: Notificar em caso de falha
        if: failure()
        run: |
          echo "❌ Bot falhou na execução"
          echo "Verifique os logs acima para detalhes"
        continue-on-error: true
