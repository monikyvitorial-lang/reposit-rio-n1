name: Amazon Bot - TESTE (Debug)

on:
  workflow_dispatch:  # Apenas manual

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar Chrome e dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver
      
      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Executar bot em MODO DEBUG
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          MIN_DISCOUNT_PERCENT: '5'
          HEADLESS: 'true'
          FORCE_SEND_ALL: 'true'
          WDM_CACHE_PATH: /home/runner/.wdm
        run: |
          mkdir -p /home/runner/.wdm
          echo "🧪 MODO DEBUG: MIN_DISCOUNT_PERCENT=5%, FORCE_SEND_ALL=true"
          python bot.py
